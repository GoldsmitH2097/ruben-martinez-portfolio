name: Build & Deploy

on:
  schedule:
    - cron: "0 6 * * *"   # Every day at 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore RSS cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: behance-rss-${{ runner.os }}
          restore-keys: behance-rss-

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          cname: ruben-martinez.com
          commit_message: "chore: auto-deploy [skip ci]"
